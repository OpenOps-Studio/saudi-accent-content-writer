last_updated: "2026-02-22"

cities:
  riyadh:
    tone: "مهني مباشر"
    allowed:
      - "واضح"
      - "مختصر"
      - "عملية"
    avoid:
      - "مبالغات" 
  jeddah:
    tone: "ودّي ناعم"
    allowed:
      - "خفيف"
      - "لطيف"
      - "سلس"
    avoid:
      - "حدة زائدة"
  eastern:
    tone: "محترم هادئ"
    allowed:
      - "هادئ"
      - "دقيق"
      - "موثوق"
    avoid:
      - "سخرية أو تهكم"

rules:
  hard_fail:
    - "مزج لهجات غير سعودية"
    - "مصطلحات قبلية حساسة"
  soft_fail:
    - "لهجة عامة لا تعكس نبرة المدينة"
